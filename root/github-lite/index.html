<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GitHub Lite</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
/* markdown-it wraps block content in <p>; trim its outer margins inside cards */
.md-body > :first-child { margin-top: 0; }
.md-body > :last-child { margin-bottom: 0; }
.md-body pre { padding: .5rem; background: #f6f8fa; border-radius: 4px; overflow: auto; }
.md-body table { border-collapse: collapse; }
.md-body th, .md-body td { border: 1px solid #d0d7de; padding: 2px 6px; }
</style>
</head>
<body class="bg-light">
<div class="container-fluid py-2" id="app"></div>
<script src="markdown-it.min.js"></script>
<script src="app.js"></script>
</body>
</html>
